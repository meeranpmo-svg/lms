<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payments — Ansha Montessori LMS</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>
<div id="toast-container"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="top-header">
      <div class="header-left"><span class="page-title">Payments</span></div>
      <div class="header-right"><span id="user-name" class="text-sm font-medium"></span></div>
    </header>
    <main class="page-content">
      <div class="page-header">
        <div>
          <h1>Payment Records</h1>
          <p>Track all student fee payments and receipts</p>
        </div>
        <button class="btn btn-primary" onclick="openModal('add-payment-modal')">+ Record Payment</button>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="pay-stats" style="grid-template-columns:repeat(4,1fr);"></div>

      <!-- Filter Bar -->
      <div class="filter-bar mt-4">
        <div class="search-input">
          <span>🔍</span>
          <input type="text" id="search-input" placeholder="Search by student or receipt no…">
        </div>
        <select class="form-control" id="filter-method" style="width:auto;min-width:140px;">
          <option value="">All Methods</option>
          <option value="cash">Cash</option>
          <option value="bank">Bank Transfer</option>
          <option value="cheque">Cheque</option>
          <option value="online">Online</option>
        </select>
        <select class="form-control" id="filter-course" style="width:auto;min-width:200px;">
          <option value="">All Courses</option>
        </select>
      </div>

      <!-- Pending Fee Alerts -->
      <div id="pending-alerts"></div>

      <!-- Payments Table -->
      <div class="card mt-4">
        <div class="card-header">
          <h2>Payment History</h2>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Receipt No.</th>
                <th>Student</th>
                <th>Course</th>
                <th>Amount</th>
                <th>Method</th>
                <th>Date</th>
                <th>Notes</th>
                <th class="no-print">Action</th>
              </tr>
            </thead>
            <tbody id="pay-table"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Add Payment Modal -->
<div class="modal-backdrop" id="add-payment-modal">
  <div class="modal" style="max-width:580px;">
    <div class="modal-header">
      <h3>Record Payment</h3>
      <button class="modal-close" onclick="closeModal('add-payment-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Student *</label>
          <select id="p-student" class="form-control" onchange="populateCourses()">
            <option value="">— Select Student —</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Course *</label>
          <select id="p-course" class="form-control">
            <option value="">— Select Course —</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Amount (INR) *</label>
          <input type="number" id="p-amount" class="form-control" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">Payment Method *</label>
          <select id="p-method" class="form-control">
            <option value="cash">Cash</option>
            <option value="bank">Bank Transfer</option>
            <option value="cheque">Cheque</option>
            <option value="online">Online</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Receipt No.</label>
          <input type="text" id="p-receipt" class="form-control" placeholder="Auto-generate if blank">
        </div>
        <div class="form-group">
          <label class="form-label">Payment Date *</label>
          <input type="date" id="p-date" class="form-control">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <input type="text" id="p-notes" class="form-control" placeholder="Optional notes">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Fee Plan</label>
          <select id="p-plan" class="form-control" onchange="updatePlanFields()">
            <option value="full">💳 Full Payment (1×)</option>
            <option value="2x">📅 2 Installments</option>
            <option value="4x">📆 4 Installments</option>
          </select>
        </div>
        <div class="form-group" id="install-no-grp" style="display:none;">
          <label class="form-label">Installment No.</label>
          <select id="p-installment-no" class="form-control"></select>
        </div>
      </div>
      <div id="plan-info" style="display:none;background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:10px 14px;font-size:.84rem;color:#166534;margin-bottom:4px;"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('add-payment-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="savePayment()">Save Payment</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/data.js"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/utils.js"></script>
<script>
const user = initPage('admin');
if (user) { sbSyncToLocal(user.id, 'admin').then(renderPage).catch(renderPage); }

function renderPage() {
  // Set today's date as default
  document.getElementById('p-date').value = new Date().toISOString().split('T')[0];
  // Populate student dropdown
  const students = dbGet(DB.USERS).filter(u => u.role === 'student');
  document.getElementById('p-student').innerHTML += students.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  // Populate course filter
  const courses = dbGet(DB.COURSES);
  document.getElementById('filter-course').innerHTML += courses.map(c => `<option value="${c.id}">${c.icon} ${c.title}</option>`).join('');
  // Events
  document.getElementById('search-input').addEventListener('input', renderTable);
  document.getElementById('filter-method').addEventListener('change', renderTable);
  document.getElementById('filter-course').addEventListener('change', renderTable);
  renderStats();
  renderPendingAlerts();
  renderTable();
}

function populateCourses() {
  const studentId = document.getElementById('p-student').value;
  const enrollments = studentId ? getStudentEnrollments(studentId) : [];
  const allCourses = dbGet(DB.COURSES);
  const courseOpts = enrollments.map(e => {
    const c = dbGetOne(DB.COURSES, e.courseId);
    return c ? `<option value="${c.id}" data-fee="${c.fee}">${c.icon} ${c.title} — ${formatCurrency(c.fee)}</option>` : '';
  }).join('');
  document.getElementById('p-course').innerHTML = '<option value="">— Select Course —</option>' + (courseOpts || allCourses.map(c => `<option value="${c.id}" data-fee="${c.fee}">${c.icon} ${c.title}</option>`).join(''));
  updatePlanFields();
}

function updatePlanFields() {
  const plan = document.getElementById('p-plan').value;
  const courseId = document.getElementById('p-course').value;
  const course = courseId ? dbGetOne(DB.COURSES, courseId) : null;
  const noGrp = document.getElementById('install-no-grp');
  const infoDiv = document.getElementById('plan-info');
  if (plan === 'full') {
    noGrp.style.display = 'none';
    infoDiv.style.display = 'none';
    if (course) document.getElementById('p-amount').value = course.fee;
  } else {
    const parts = plan === '2x' ? 2 : 4;
    noGrp.style.display = '';
    document.getElementById('p-installment-no').innerHTML =
      Array.from({length: parts}, (_, i) =>
        `<option value="${i+1}">Installment ${i+1} of ${parts}</option>`).join('');
    if (course) {
      const instAmt = Math.round(course.fee / parts);
      document.getElementById('p-amount').value = instAmt;
      infoDiv.style.display = '';
      infoDiv.innerHTML = `💡 Total course fee: <strong>₹${course.fee.toLocaleString('en-IN')}</strong> &divide; ${parts} installments = <strong>₹${instAmt.toLocaleString('en-IN')}</strong> each`;
    }
  }
}

function renderStats() {
  const payments = dbGet(DB.PAYMENTS);
  // Parse balance from description: "... | Balance: ₹10000"
  const totalCollected = payments.reduce((s, p) => s + (p.amount || 0), 0);
  const totalBalance = payments.reduce((s, p) => {
    const m = (p.description || '').match(/Balance: ₹(\d+)/);
    return s + (m ? parseInt(m[1]) : 0);
  }, 0);
  const totalFee = totalCollected + totalBalance;
  const paidCount = payments.filter(p => p.status === 'paid').length;
  const partialCount = payments.filter(p => p.status === 'partial').length;

  document.getElementById('pay-stats').innerHTML = `
    <div class="stat-card"><div class="stat-icon green">💰</div><div class="stat-info"><div class="stat-value">₹${totalCollected.toLocaleString('en-IN')}</div><div class="stat-label">Total Collected</div></div></div>
    <div class="stat-card"><div class="stat-icon gold">⏳</div><div class="stat-info"><div class="stat-value">₹${totalBalance.toLocaleString('en-IN')}</div><div class="stat-label">Balance Pending</div></div></div>
    <div class="stat-card"><div class="stat-icon teal">📊</div><div class="stat-info"><div class="stat-value">₹${totalFee.toLocaleString('en-IN')}</div><div class="stat-label">Total Fee Charged</div></div></div>
    <div class="stat-card"><div class="stat-icon blue">📋</div><div class="stat-info"><div class="stat-value">${paidCount} paid · ${partialCount} partial</div><div class="stat-label">Payment Status</div></div></div>`;
}

function renderPendingAlerts() {
  const pending = dbGet(DB.ENROLLMENTS).filter(e => e.feeStatus === 'pending');
  if (!pending.length) { document.getElementById('pending-alerts').innerHTML = ''; return; }
  const items = pending.map(e => {
    const s = dbGetOne(DB.USERS, e.studentId);
    const c = dbGetOne(DB.COURSES, e.courseId);
    if (!s || !c) return '';
    const paidPayments = dbGet(DB.PAYMENTS).filter(p => p.studentId === e.studentId && p.courseId === e.courseId);
    const feePlan = e.feePlan || { type: 'full', totalFee: c.fee };
    const numInstall = feePlan.type === '2x' ? 2 : feePlan.type === '4x' ? 4 : 1;
    const paidAmt = paidPayments.reduce((s, p) => s + (p.amount || 0), 0);
    const balance = Math.max(0, (feePlan.totalFee || c.fee) - paidAmt);
    const planLabel = feePlan.type === 'full' ? 'Full' : feePlan.type === '2x' ? '2 Installments' : '4 Installments';
    return `<div class="flex items-center justify-between" style="padding:var(--space-2) 0;border-bottom:1px solid var(--gray-100);">
      <div>
        <span class="text-sm"><strong>${s.name}</strong> — ${c.icon} ${c.title}</span>
        <div class="text-xs text-muted">${planLabel} · Paid: ${formatCurrency(paidAmt)} · <strong style="color:#dc2626;">Balance: ${formatCurrency(balance)}</strong> · ${paidPayments.length}/${numInstall} installments</div>
      </div>
      <button class="btn btn-success btn-sm" onclick="quickMarkPaid('${e.id}')">✓ Mark Paid</button>
    </div>`;
  }).join('');
  document.getElementById('pending-alerts').innerHTML = `
    <div class="card mt-4" style="border-left:4px solid #f59e0b;">
      <div class="card-header"><h3 style="color:#b45309;">⚠️ Pending Fees (${pending.length})</h3></div>
      <div class="card-body">${items}</div>
    </div>`;
}

function quickMarkPaid(enrollmentId) {
  const e = dbGetOne(DB.ENROLLMENTS, enrollmentId);
  if (!e) return;
  e.feeStatus = 'paid';
  dbSave(DB.ENROLLMENTS, e);
  const s = dbGetOne(DB.USERS, e.studentId);
  const c = dbGetOne(DB.COURSES, e.courseId);
  // Auto-create payment record
  const payment = {
    id: genId(), studentId: e.studentId, courseId: e.courseId,
    amount: c ? c.fee : 0, method: 'cash',
    receiptNo: 'RCP-' + Date.now().toString().slice(-4),
    paidAt: new Date().toISOString(), notes: 'Marked paid from pending list'
  };
  dbSave(DB.PAYMENTS, payment);
  showToast(`Fee marked as paid for ${s ? s.name : 'student'}`, 'success');
  renderStats(); renderPendingAlerts(); renderTable();
}

function renderTable() {
  const searchQ  = document.getElementById('search-input').value.toLowerCase();
  const methodF  = document.getElementById('filter-method').value;
  const courseF  = document.getElementById('filter-course').value;

  let payments = dbGet(DB.PAYMENTS).slice().reverse();
  if (methodF) payments = payments.filter(p => p.method === methodF);
  if (courseF) payments = payments.filter(p => p.courseId === courseF);

  const methodLabels = { cash: '💵 Cash', bank: '🏦 Bank', cheque: '📝 Cheque', online: '💳 Online' };
  const rows = payments.map(p => {
    const s = dbGetOne(DB.USERS, p.studentId);
    const c = dbGetOne(DB.COURSES, p.courseId);
    if (!s || !c) return '';
    if (searchQ && !s.name.toLowerCase().includes(searchQ) && !(p.receiptNo || '').toLowerCase().includes(searchQ)) return '';
    return `<tr>
      <td class="font-mono text-sm">${p.receiptNo || '—'}</td>
      <td><div class="font-medium text-sm">${s.name}</div><div class="text-xs text-muted">${s.email}</div></td>
      <td class="text-sm">${c.icon} ${c.title}</td>
      <td class="font-bold text-sm" style="color:var(--success);">${formatCurrency(p.amount)}${p.installmentPlan && p.installmentPlan !== 'full' ? `<div class="text-xs text-muted">Inst. ${p.installmentNo} of ${p.installmentPlan === '2x' ? 2 : 4}</div>` : ''}</td>
      <td class="text-sm">${methodLabels[p.method] || p.method}</td>
      <td class="text-sm text-muted">${formatDate(p.paidAt)}</td>
      <td class="text-sm text-muted">${p.notes || '—'}</td>
      <td class="no-print"><button class="btn btn-outline btn-sm" onclick="printReceipt('${p.id}')"><i class="fa-solid fa-print"></i> Receipt</button></td>
    </tr>`;
  }).join('');
  document.getElementById('pay-table').innerHTML = rows || '<tr><td colspan="7" class="text-center text-muted" style="padding:2rem;">No payment records found</td></tr>';
}

function savePayment() {
  const studentId = document.getElementById('p-student').value;
  const courseId  = document.getElementById('p-course').value;
  const amount    = parseFloat(document.getElementById('p-amount').value);
  const method    = document.getElementById('p-method').value;
  const date      = document.getElementById('p-date').value;
  const plan      = document.getElementById('p-plan').value;
  const installNo = plan !== 'full' ? parseInt(document.getElementById('p-installment-no').value) : 1;
  if (!studentId || !courseId || !amount || !date) { showToast('Student, course, amount and date are required', 'error'); return; }

  const receiptNo = document.getElementById('p-receipt').value.trim() || 'RCP-' + Date.now().toString().slice(-4);
  const payment = {
    id: genId(), studentId, courseId, amount, method, receiptNo,
    paidAt: new Date(date).toISOString(),
    notes: document.getElementById('p-notes').value.trim(),
    installmentPlan: plan,
    installmentNo: installNo
  };
  dbSave(DB.PAYMENTS, payment);

  // Update enrollment fee plan + status
  const enrollment = getEnrollment(studentId, courseId);
  const course = dbGetOne(DB.COURSES, courseId);
  if (enrollment) {
    const totalFee = course ? course.fee : amount;
    enrollment.feePlan = { type: plan, totalFee };
    const numInstall = plan === '2x' ? 2 : plan === '4x' ? 4 : 1;
    const paidPayments = dbGet(DB.PAYMENTS).filter(p => p.studentId === studentId && p.courseId === courseId);
    enrollment.feeStatus = paidPayments.length >= numInstall ? 'paid' : paidPayments.length > 0 ? 'partial' : 'pending';
    dbSave(DB.ENROLLMENTS, enrollment);
  }

  closeModal('add-payment-modal');
  ['p-student','p-course','p-amount','p-receipt','p-notes'].forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('p-course').innerHTML = '<option value="">— Select Course —</option>';
  document.getElementById('p-plan').value = 'full';
  document.getElementById('install-no-grp').style.display = 'none';
  document.getElementById('plan-info').style.display = 'none';

  renderStats(); renderPendingAlerts(); renderTable();
  showToast(`Payment of ₹${amount.toLocaleString('en-IN')} recorded — Receipt ${receiptNo}${plan !== 'full' ? ' (Installment ' + installNo + ')' : ''}`, 'success');
}

function printReceipt(paymentId) {
  const p = dbGetOne(DB.PAYMENTS, paymentId);
  if (!p) return;
  const s = dbGetOne(DB.USERS, p.studentId);
  const c = dbGetOne(DB.COURSES, p.courseId);
  if (!s || !c) return;
  const methodLabels = { cash: 'Cash', bank: 'Bank Transfer', cheque: 'Cheque', online: 'Online' };
  const win = window.open('', '_blank', 'width=680,height=720');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>Fee Receipt — ${p.receiptNo}</title>
  <style>
    body{font-family:'Segoe UI',sans-serif;margin:0;padding:30px;color:#1e293b;background:#fff;}
    .receipt{max-width:600px;margin:0 auto;border:2px solid #0ea5e9;border-radius:12px;overflow:hidden;}
    .receipt-header{background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;padding:24px 30px;text-align:center;}
    .receipt-header h1{margin:0 0 4px;font-size:1.5rem;}
    .receipt-header p{margin:0;opacity:.85;font-size:.9rem;}
    .receipt-body{padding:24px 30px;}
    .receipt-no{display:flex;justify-content:space-between;background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:12px 16px;margin-bottom:20px;}
    .receipt-no .label{color:#0369a1;font-weight:700;font-size:.9rem;}
    .receipt-no .value{font-weight:700;color:#0c4a6e;}
    table{width:100%;border-collapse:collapse;}
    td{padding:10px 0;border-bottom:1px solid #e2e8f0;font-size:.92rem;}
    td:first-child{color:#64748b;width:45%;}
    td:last-child{font-weight:600;color:#1e293b;}
    .amount-row td{font-size:1.2rem;color:#16a34a;border-bottom:none;padding-top:16px;}
    .receipt-footer{background:#f8fafc;padding:16px 30px;text-align:center;font-size:.8rem;color:#94a3b8;border-top:1px solid #e2e8f0;}
    .stamp{display:inline-block;border:3px solid #16a34a;border-radius:8px;padding:6px 20px;color:#16a34a;font-weight:800;font-size:1.1rem;letter-spacing:2px;margin-top:12px;}
    @media print{body{padding:0;}.no-print{display:none;}}
  </style></head><body>
  <div class="receipt">
    <div class="receipt-header">
      <h1>🏫 Ansha Montessori LMS</h1>
      <p>Teacher Training Institute — Fee Receipt</p>
    </div>
    <div class="receipt-body">
      <div class="receipt-no">
        <span class="label">Receipt No.</span><span class="value">${p.receiptNo || '—'}</span>
      </div>
      <table>
        <tr><td>Student Name</td><td>${s.name}</td></tr>
        <tr><td>Student Email</td><td>${s.email}</td></tr>
        <tr><td>Course</td><td>${c.icon} ${c.title}</td></tr>
        <tr><td>Payment Method</td><td>${methodLabels[p.method] || p.method}</td></tr>
        <tr><td>Payment Date</td><td>${formatDate(p.paidAt)}</td></tr>
        ${p.notes ? `<tr><td>Notes</td><td>${p.notes}</td></tr>` : ''}
        <tr class="amount-row"><td>Amount Paid</td><td>₹${(p.amount || 0).toLocaleString('en-IN')}</td></tr>
      </table>
      <div style="text-align:center;margin-top:20px;">
        <div class="stamp">✓ PAID</div>
      </div>
    </div>
    <div class="receipt-footer">
      <p>This is a computer-generated receipt and does not require a physical signature.</p>
      <p>Ansha Montessori LMS · Generated on ${new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}</p>
      <button class="no-print" onclick="window.print()" style="margin-top:8px;padding:8px 20px;background:#0ea5e9;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.9rem;">🖨 Print Receipt</button>
    </div>
  </div>
  <script>window.onload=()=>window.print();<\/script>
  </body></html>`);
  win.document.close();
}
</script>
</body>
</html>
