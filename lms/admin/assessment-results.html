<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assessment Results — Ansha Montessori LMS</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>
<div id="toast-container"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="top-header">
      <div class="header-left"><span class="page-title">Assessment Results</span></div>
      <div class="header-right"><span id="user-name" class="text-sm font-medium"></span></div>
    </header>
    <main class="page-content">
      <div class="page-header">
        <div><h1>📋 Assessment Results</h1><p>Record and view student scores for each assessment</p></div>
        <button class="btn btn-primary" onclick="openModal('new-assessment-modal')">+ New Assessment</button>
      </div>

      <!-- Assessment selector -->
      <div class="card mb-4">
        <div class="card-body">
          <div class="flex gap-4 flex-wrap items-center">
            <div class="form-group" style="margin:0;flex:1;min-width:220px;">
              <label class="form-label">Select Assessment</label>
              <select id="asmt-select" class="form-control" onchange="renderResults()"></select>
            </div>
            <div style="margin-top:22px;display:flex;gap:8px;">
              <button class="btn btn-outline btn-sm" onclick="openModal('enter-score-modal')"><i class="fa-solid fa-plus"></i> Enter Score</button>
              <button class="btn btn-outline btn-sm" onclick="exportCSV()"><i class="fa-solid fa-download"></i> CSV</button>
              <button class="btn btn-outline btn-sm no-print" onclick="window.print()"><i class="fa-solid fa-print"></i> Print</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Summary -->
      <div class="grid grid-4 mb-5" id="asmt-summary" style="gap:var(--space-4);"></div>

      <!-- Results Table -->
      <div class="card" id="asmt-table-wrap"></div>
    </main>
  </div>
</div>

<!-- New Assessment Modal -->
<div class="modal-backdrop" id="new-assessment-modal">
  <div class="modal" style="max-width:520px;">
    <div class="modal-header">
      <h3>Create Assessment</h3>
      <button class="modal-close" onclick="closeModal('new-assessment-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Assessment Title *</label>
        <input type="text" id="na-title" class="form-control" placeholder="e.g. Montessori Diploma Assessment">
      </div>
      <div class="form-group">
        <label class="form-label">Course</label>
        <select id="na-course" class="form-control"></select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Max Score</label>
          <input type="number" id="na-max" class="form-control" value="100" min="1">
        </div>
        <div class="form-group">
          <label class="form-label">Assessment Date</label>
          <input type="date" id="na-date" class="form-control">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Google Form URL (optional)</label>
        <input type="url" id="na-form" class="form-control" placeholder="https://docs.google.com/forms/...">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input type="text" id="na-desc" class="form-control" placeholder="Brief description">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('new-assessment-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="createAssessment()">Create</button>
    </div>
  </div>
</div>

<!-- Enter Score Modal -->
<div class="modal-backdrop" id="enter-score-modal">
  <div class="modal" style="max-width:480px;">
    <div class="modal-header">
      <h3>Enter Student Score</h3>
      <button class="modal-close" onclick="closeModal('enter-score-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Student *</label>
        <select id="es-student" class="form-control">
          <option value="">— Select Student —</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Score *</label>
          <input type="number" id="es-score" class="form-control" placeholder="e.g. 85" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Max Score</label>
          <input type="number" id="es-max" class="form-control" readonly style="background:var(--gray-50);">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Remarks</label>
        <input type="text" id="es-remarks" class="form-control" placeholder="Optional remarks">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('enter-score-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveScore()">Save Score</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/data.js"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/utils.js"></script>
<script>
const user = initPage('admin');
if (user) renderPage();

function renderPage() {
  // Populate course dropdown in create modal
  document.getElementById('na-course').innerHTML =
    '<option value="">— All / General —</option>' +
    dbGet(DB.COURSES).map(c => `<option value="${c.id}">${c.icon} ${c.title}</option>`).join('');
  document.getElementById('na-date').value = new Date().toISOString().split('T')[0];

  // Populate student dropdown
  const students = getUsersByRole('student');
  document.getElementById('es-student').innerHTML =
    '<option value="">— Select Student —</option>' +
    students.map(s => `<option value="${s.id}">${s.name}</option>`).join('');

  populateAssessmentSelect();
  renderResults();
}

function populateAssessmentSelect() {
  const assessments = dbGet(DB.ASSESSMENTS);
  document.getElementById('asmt-select').innerHTML =
    assessments.map(a => `<option value="${a.id}">${a.title}</option>`).join('') ||
    '<option value="">No assessments yet</option>';
}

function getSelectedAssessment() {
  const id = document.getElementById('asmt-select').value;
  return id ? dbGetOne(DB.ASSESSMENTS, id) : null;
}

function gradeLabel(pct) {
  if (pct >= 80) return 'A';
  if (pct >= 60) return 'B';
  if (pct >= 40) return 'C';
  if (pct > 0)   return 'D';
  return 'F';
}

function renderResults() {
  const asmt = getSelectedAssessment();
  // Sync max score field
  if (asmt) document.getElementById('es-max').value = asmt.maxScore || 100;

  const results = asmt ? getAssessmentResults(asmt.id) : [];
  const students = getUsersByRole('student');

  // Build enrolled students list
  let rows = students.map(s => {
    const r = results.find(x => x.studentId === s.id) || null;
    const score = r ? r.score : null;
    const maxScore = asmt ? (asmt.maxScore || 100) : 100;
    const pct = score !== null ? Math.round((score / maxScore) * 100) : null;
    return { student: s, score, maxScore, pct, remarks: r ? r.remarks : '', resultId: r ? r.id : null };
  });

  // Summary
  const scored = rows.filter(r => r.score !== null);
  const avg = scored.length ? Math.round(scored.reduce((s, r) => s + r.pct, 0) / scored.length) : 0;
  const passed = scored.filter(r => r.pct >= 40).length;
  const topScore = scored.length ? Math.max(...scored.map(r => r.score)) : 0;

  document.getElementById('asmt-summary').innerHTML = [
    { label: 'Total Students', value: students.length, icon: '👩‍🎓', color: 'teal' },
    { label: 'Scores Recorded', value: `${scored.length}/${students.length}`, icon: '📝', color: 'blue' },
    { label: 'Class Average', value: avg + '%', icon: '📊', color: 'gold' },
    { label: 'Passed (≥40%)', value: passed, icon: '✅', color: 'green' },
  ].map(s => `<div class="stat-card"><div class="stat-icon ${s.color}">${s.icon}</div><div class="stat-info"><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div></div></div>`).join('');

  if (!asmt) {
    document.getElementById('asmt-table-wrap').innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>Create an assessment to get started</p></div>';
    return;
  }

  // Form link banner
  const formBanner = asmt.formUrl ? `
    <div class="card-body" style="background:var(--primary-light);border-bottom:1px solid var(--gray-200);padding:12px 20px;">
      <div class="flex items-center gap-3">
        <span>📎</span>
        <span class="text-sm">Google Form: <a href="${asmt.formUrl}" target="_blank" rel="noopener" style="color:var(--primary);font-weight:600;">Open Form →</a></span>
        <span class="text-muted text-xs">Share with students to collect responses</span>
      </div>
    </div>` : '';

  document.getElementById('asmt-table-wrap').innerHTML = `
    <div class="card-header"><h2>${asmt.title}</h2><span class="badge badge-primary">Max: ${asmt.maxScore}</span></div>
    ${formBanner}
    <div class="table-wrapper">
      <table>
        <thead><tr>
          <th>#</th><th>Student</th>
          <th class="grade-cell">Score</th>
          <th class="grade-cell">Percentage</th>
          <th class="grade-cell">Grade</th>
          <th>Remarks</th>
          <th class="no-print">Action</th>
        </tr></thead>
        <tbody>
          ${rows.map((r, i) => {
            const scoreDisplay = r.score !== null
              ? `<strong>${r.score}</strong>/${r.maxScore}`
              : '<span class="text-muted">—</span>';
            const pctDisplay = r.pct !== null
              ? `<span class="grade-pill ${gradeLabel(r.pct)}">${r.pct}%</span>`
              : '<span class="text-muted">—</span>';
            const gradeDisplay = r.pct !== null
              ? `<span class="grade-pill ${gradeLabel(r.pct)}">${gradeLabel(r.pct)}</span>`
              : '<span class="text-muted">—</span>';
            return `<tr>
              <td class="text-muted text-sm">${i + 1}</td>
              <td>
                <div class="flex items-center gap-2">
                  <div class="avatar avatar-sm">${r.student.avatar || getInitials(r.student.name)}</div>
                  <div>
                    <div class="font-medium text-sm">${r.student.name}</div>
                    <div class="text-xs text-muted">${r.student.email}</div>
                  </div>
                </div>
              </td>
              <td class="grade-cell text-sm">${scoreDisplay}</td>
              <td class="grade-cell">${pctDisplay}</td>
              <td class="grade-cell">${gradeDisplay}</td>
              <td class="text-sm text-muted">${r.remarks || '—'}</td>
              <td class="no-print">
                <button class="btn btn-outline btn-sm" onclick="openEditScore('${r.student.id}','${r.resultId || ''}')">
                  ${r.score !== null ? '<i class="fa-solid fa-pen"></i> Edit' : '<i class="fa-solid fa-plus"></i> Add'}
                </button>
                ${r.resultId ? `<button class="btn btn-danger btn-sm ml-2" onclick="deleteScore('${r.resultId}')"><i class="fa-solid fa-trash"></i></button>` : ''}
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

function openEditScore(studentId, resultId) {
  const asmt = getSelectedAssessment();
  if (!asmt) { showToast('Select an assessment first', 'error'); return; }
  document.getElementById('es-student').value = studentId;
  document.getElementById('es-max').value = asmt.maxScore || 100;
  if (resultId) {
    const r = dbGetOne(DB.ASSESSMENT_RESULTS, resultId);
    if (r) {
      document.getElementById('es-score').value = r.score;
      document.getElementById('es-remarks').value = r.remarks || '';
    }
  } else {
    document.getElementById('es-score').value = '';
    document.getElementById('es-remarks').value = '';
  }
  openModal('enter-score-modal');
}

function saveScore() {
  const asmt = getSelectedAssessment();
  if (!asmt) { showToast('No assessment selected', 'error'); return; }
  const studentId = document.getElementById('es-student').value;
  const score = parseFloat(document.getElementById('es-score').value);
  const remarks = document.getElementById('es-remarks').value.trim();
  if (!studentId) { showToast('Select a student', 'error'); return; }
  if (isNaN(score) || score < 0) { showToast('Enter a valid score', 'error'); return; }
  if (score > (asmt.maxScore || 100)) { showToast(`Score cannot exceed ${asmt.maxScore}`, 'error'); return; }

  // Check existing result
  const existing = getAssessmentResult(studentId, asmt.id);
  const result = {
    id: existing ? existing.id : genId(),
    studentId, assessmentId: asmt.id,
    score, remarks,
    recordedAt: new Date().toISOString(),
    recordedBy: user.id
  };
  dbSave(DB.ASSESSMENT_RESULTS, result);
  closeModal('enter-score-modal');
  renderResults();
  const s = dbGetOne(DB.USERS, studentId);
  showToast(`Score saved for ${s ? s.name : 'student'}`, 'success');
}

function deleteScore(resultId) {
  showConfirm('Delete this score?', () => {
    dbDelete(DB.ASSESSMENT_RESULTS, resultId);
    renderResults();
    showToast('Score deleted', 'warning');
  });
}

function createAssessment() {
  const title = document.getElementById('na-title').value.trim();
  if (!title) { showToast('Title is required', 'error'); return; }
  const asmt = {
    id: genId(),
    title,
    courseId: document.getElementById('na-course').value || null,
    maxScore: parseInt(document.getElementById('na-max').value) || 100,
    date: document.getElementById('na-date').value,
    formUrl: document.getElementById('na-form').value.trim() || null,
    description: document.getElementById('na-desc').value.trim(),
    createdAt: new Date().toISOString()
  };
  dbSave(DB.ASSESSMENTS, asmt);
  closeModal('new-assessment-modal');
  populateAssessmentSelect();
  document.getElementById('asmt-select').value = asmt.id;
  renderResults();
  showToast(`Assessment "${title}" created!`, 'success');
}

function exportCSV() {
  const asmt = getSelectedAssessment();
  if (!asmt) { showToast('Select an assessment first', 'error'); return; }
  const results = getAssessmentResults(asmt.id);
  const students = getUsersByRole('student');
  const rows = [['Name', 'Email', 'Score', 'Max Score', 'Percentage', 'Grade', 'Remarks']];
  students.forEach(s => {
    const r = results.find(x => x.studentId === s.id);
    const score = r ? r.score : '';
    const pct = r ? Math.round((r.score / asmt.maxScore) * 100) : '';
    const grade = pct !== '' ? gradeLabel(pct) : '';
    rows.push([s.name, s.email, score, asmt.maxScore, pct ? pct + '%' : '', grade, r ? (r.remarks || '') : '']);
  });
  const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `${asmt.title.replace(/\s+/g,'-')}-results.csv`;
  a.click();
}

function getInitials(name) {
  return name ? name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase() : '?';
}
</script>
</body>
</html>
