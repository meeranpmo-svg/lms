<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admissions — Ansha Montessori LMS</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>
<div id="toast-container"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="top-header">
      <div class="header-left"><span class="page-title">Admissions</span></div>
      <div class="header-right"><span id="user-name" class="text-sm font-medium"></span></div>
    </header>
    <main class="page-content">
      <div class="page-header">
        <div>
          <h1>Admission Management</h1>
          <p>Track and process student admission applications</p>
        </div>
        <button class="btn btn-primary" onclick="openModal('new-admission-modal')">+ New Application</button>
        <button class="btn btn-success" onclick="shareRegistrationLink()" style="background:#25d366;border-color:#25d366;">
          📲 Share Registration Link
        </button>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="adm-stats" style="grid-template-columns:repeat(3,1fr);"></div>

      <!-- Filter Bar -->
      <div class="filter-bar mt-4">
        <div class="search-input">
          <span>🔍</span>
          <input type="text" id="search-input" placeholder="Search by name or email…">
        </div>
        <select class="form-control" id="filter-course" style="width:auto;min-width:200px;">
          <option value="">All Courses</option>
        </select>
        <select class="form-control" id="filter-status" style="width:auto;min-width:150px;">
          <option value="">All Status</option>
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>

      <!-- Admissions Table -->
      <div class="card mt-4">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Applicant</th>
                <th>Father's Name</th>
                <th>Phone</th>
                <th>Course Applied</th>
                <th>Applied Date</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="adm-table"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- New Admission Modal -->
<div class="modal-backdrop" id="new-admission-modal">
  <div class="modal" style="max-width:700px;">
    <div class="modal-header">
      <h3>New Admission Application</h3>
      <button class="modal-close" onclick="closeModal('new-admission-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Student Name *</label>
          <input type="text" id="a-name" class="form-control" placeholder="Full name">
        </div>
        <div class="form-group">
          <label class="form-label">Father's Name *</label>
          <input type="text" id="a-father" class="form-control" placeholder="Father's full name">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date of Birth</label>
          <input type="date" id="a-dob" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">Gender</label>
          <select id="a-gender" class="form-control">
            <option value="Female">Female</option>
            <option value="Male">Male</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">CNIC / B-Form</label>
          <input type="text" id="a-cnic" class="form-control" placeholder="35202-1234567-8">
        </div>
        <div class="form-group">
          <label class="form-label">Phone *</label>
          <input type="tel" id="a-phone" class="form-control" placeholder="+92-300-0000000">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="a-email" class="form-control" placeholder="applicant@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">Course Applied *</label>
          <select id="a-course" class="form-control">
            <option value="">— Select Course —</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Address</label>
        <input type="text" id="a-address" class="form-control" placeholder="Full home address">
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea id="a-notes" class="form-control" placeholder="Any additional notes…" rows="2"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('new-admission-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveAdmission()">Submit Application</button>
    </div>
  </div>
</div>

<!-- View Admission Modal -->
<div class="modal-backdrop" id="view-admission-modal">
  <div class="modal" style="max-width:600px;">
    <div class="modal-header">
      <h3>Application Details</h3>
      <button class="modal-close" onclick="closeModal('view-admission-modal')">×</button>
    </div>
    <div class="modal-body" id="adm-detail-body"></div>
    <div class="modal-footer" id="adm-detail-actions"></div>
  </div>
</div>

<script>
function shareRegistrationLink() {
  const base = window.location.origin + window.location.pathname.replace('/admin/admission.html', '');
  const link = base + '/register.html';
  const msg  = encodeURIComponent(
    '🌟 *Ansha Montessori Teacher Training Institute*\n\n' +
    'Dear Student,\n\n' +
    'Please fill in the registration form to apply for admission:\n\n' +
    '📋 ' + link + '\n\n' +
    'Courses Available:\n' +
    '🎓 Advance Montessori Teacher Training\n' +
    '🗣️ Spoken English\n' +
    '📚 Phonics Training\n' +
    '🧠 Child Psychology\n\n' +
    'We look forward to hearing from you! 😊'
  );
  window.open('https://wa.me/?text=' + msg, '_blank');
}
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/data.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/utils.js"></script>
<script>
const SUPA_URL = 'https://twzcefikdychhsjwjekf.supabase.co';
const SUPA_KEY = 'sb_publishable_GijBRmulhuyIp3bigyhMUw_hVmQiB0y';
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

let allRegistrations = [];

const user = initPage('admin');
if (user) renderPage();

function renderPage() {
  document.getElementById('search-input').addEventListener('input', applyFilters);
  document.getElementById('filter-course').addEventListener('change', applyFilters);
  document.getElementById('filter-status').addEventListener('change', applyFilters);
  loadFromSupabase();
}

async function loadFromSupabase() {
  document.getElementById('adm-table').innerHTML =
    '<tr><td colspan="7" class="text-center text-muted" style="padding:2rem;">Loading…</td></tr>';

  const { data, error } = await sb
    .from('registrations')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    document.getElementById('adm-table').innerHTML =
      `<tr><td colspan="7" class="text-center text-muted" style="padding:2rem;">Error: ${error.message}</td></tr>`;
    return;
  }

  allRegistrations = data || [];
  renderStats();
  applyFilters();
}

function renderStats() {
  const pending  = allRegistrations.filter(a => a.status === 'pending').length;
  const approved = allRegistrations.filter(a => a.status === 'approved').length;
  const rejected = allRegistrations.filter(a => a.status === 'rejected').length;
  document.getElementById('adm-stats').innerHTML = `
    <div class="stat-card"><div class="stat-icon gold">⏳</div><div class="stat-info"><div class="stat-value">${pending}</div><div class="stat-label">Pending</div></div></div>
    <div class="stat-card"><div class="stat-icon green">✅</div><div class="stat-info"><div class="stat-value">${approved}</div><div class="stat-label">Approved</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:#fee2e2;">❌</div><div class="stat-info"><div class="stat-value">${rejected}</div><div class="stat-label">Rejected</div></div></div>`;
}

function applyFilters() {
  const searchQ = document.getElementById('search-input').value.toLowerCase();
  const courseF = document.getElementById('filter-course').value;
  const statusF = document.getElementById('filter-status').value;

  let list = allRegistrations;
  if (courseF) list = list.filter(a => a.course_applied === courseF);
  if (statusF) list = list.filter(a => a.status === statusF);
  if (searchQ) list = list.filter(a =>
    (a.student_name || '').toLowerCase().includes(searchQ) ||
    (a.phone || '').includes(searchQ) ||
    (a.preferred_username || '').toLowerCase().includes(searchQ)
  );

  const statusColors = { pending: 'badge-warning', approved: 'badge-success', rejected: 'badge-danger' };
  const rows = list.map(a => `<tr>
    <td>
      <div class="font-medium">${a.student_name}</div>
      <div class="text-xs text-muted">${a.preferred_username ? '@' + a.preferred_username : '—'}</div>
    </td>
    <td class="text-sm">${a.fathers_name || '—'}</td>
    <td class="text-sm">${a.phone || '—'}</td>
    <td class="text-sm">${a.course_applied || '—'}</td>
    <td class="text-sm text-muted">${a.created_at ? new Date(a.created_at).toLocaleDateString('en-IN') : '—'}</td>
    <td><span class="badge ${statusColors[a.status] || 'badge-gray'}">${capitalize(a.status)}</span></td>
    <td>
      <div class="flex gap-2">
        <button class="btn btn-outline btn-sm" onclick="viewAdmission('${a.id}')">View</button>
        ${a.status === 'pending' ? `
          <button class="btn btn-success btn-sm" onclick="updateStatus('${a.id}','approved')">✓ Approve</button>
          <button class="btn btn-danger btn-sm" onclick="updateStatus('${a.id}','rejected')">✕ Reject</button>` : ''}
      </div>
    </td>
  </tr>`).join('');

  document.getElementById('adm-table').innerHTML = rows ||
    '<tr><td colspan="7" class="text-center text-muted" style="padding:2rem;">No applications found</td></tr>';
}

async function saveAdmission() {
  const name   = document.getElementById('a-name').value.trim();
  const father = document.getElementById('a-father').value.trim();
  const phone  = document.getElementById('a-phone').value.trim();
  const course = document.getElementById('a-course').value;
  if (!name || !phone || !course) { showToast('Name, phone, and course are required', 'error'); return; }

  const { error } = await sb.from('registrations').insert({
    student_name: name, fathers_name: father,
    dob: document.getElementById('a-dob').value || null,
    gender: document.getElementById('a-gender').value,
    cnic: document.getElementById('a-cnic').value.trim(),
    phone, email: document.getElementById('a-email').value.trim(),
    address: document.getElementById('a-address').value.trim(),
    notes: document.getElementById('a-notes').value.trim(),
    course_applied: course, status: 'pending'
  });

  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  closeModal('new-admission-modal');
  document.getElementById('new-admission-modal').querySelectorAll('input,select,textarea').forEach(el => el.value = '');
  showToast(`Application for ${name} submitted!`, 'success');
  loadFromSupabase();
}

function genPassword(username) {
  const suffix = Math.floor(1000 + Math.random() * 9000);
  return (username || 'student') + '@' + suffix;
}

async function updateStatus(id, status) {
  const a = allRegistrations.find(r => r.id === id);
  if (!a) return;

  const updates = { status };
  if (status === 'approved' && !a.login_password) {
    updates.login_password = genPassword(a.preferred_username);
  }

  const { error } = await sb.from('registrations').update(updates).eq('id', id);
  if (error) { showToast('Error: ' + error.message, 'error'); return; }

  if (status === 'approved') {
    const pwd = updates.login_password || a.login_password;
    showToast(`✅ ${a.student_name} approved!`, 'success');
    // Show credentials modal
    showCredentials(a.student_name, a.preferred_username, pwd, a.phone);
  } else {
    showToast(`Application rejected`, 'warning');
  }
  loadFromSupabase();
}

function showCredentials(name, username, password, phone) {
  const msg = `🎉 *Congratulations ${name}!*\n\nYour admission to Ansha Montessori has been approved.\n\n*LMS Login Credentials:*\n🔗 ${window.location.origin.replace('/admin','')}/index.html\n👤 Username: ${username}\n🔒 Password: ${password}\n\nPlease login and change your password after first login.\n\n_Ansha Montessori Teacher Training Institute_`;

  document.getElementById('adm-detail-body').innerHTML = `
    <div style="text-align:center;padding:8px 0 16px;">
      <div style="font-size:2.5rem;margin-bottom:8px;">🎉</div>
      <h3 style="color:#10b981;margin-bottom:4px;">Student Approved!</h3>
      <p style="color:#6b7280;font-size:0.85rem;">Share these credentials with the student</p>
    </div>
    <div style="background:#f9fafb;border-radius:10px;padding:16px;font-size:0.88rem;line-height:1.8;">
      <div><span style="color:#6b7280;">Name:</span> <strong>${name}</strong></div>
      <div><span style="color:#6b7280;">Username:</span> <strong style="color:#0d9488;">${username}</strong></div>
      <div><span style="color:#6b7280;">Password:</span> <strong style="color:#f59e0b;">${password}</strong></div>
    </div>`;

  document.getElementById('adm-detail-actions').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal('view-admission-modal')">Close</button>
    <button class="btn btn-primary" onclick="window.open('https://wa.me/${phone ? phone.replace(/\D/g,'') : ''}?text=${encodeURIComponent(msg)}','_blank')">
      📲 Send via WhatsApp
    </button>`;
  openModal('view-admission-modal');
}

function viewAdmission(id) {
  const a = allRegistrations.find(r => r.id === id);
  if (!a) return;
  const statusColors = { pending: '#f59e0b', approved: '#10b981', rejected: '#ef4444' };
  const fmt = d => d ? new Date(d).toLocaleDateString('en-IN') : '—';

  document.getElementById('adm-detail-body').innerHTML = `
    <div class="grid grid-2" style="gap:var(--space-4);font-size:0.875rem;">
      <div><span class="text-muted">Name:</span><br><strong>${a.student_name}</strong></div>
      <div><span class="text-muted">Father:</span><br><strong>${a.fathers_name || '—'}</strong></div>
      <div><span class="text-muted">DOB:</span><br><strong>${fmt(a.date_of_birth)}</strong></div>
      <div><span class="text-muted">Gender:</span><br><strong>${a.gender || '—'}</strong></div>
      <div><span class="text-muted">Phone:</span><br><strong>${a.phone || '—'}</strong></div>
      <div><span class="text-muted">Course:</span><br><strong>${a.course_applied || '—'}</strong></div>
      <div><span class="text-muted">Student Type:</span><br><strong>${a.student_type || '—'}</strong></div>
      <div><span class="text-muted">Fees Paid:</span><br><strong>₹${a.fees_paid ? Number(a.fees_paid).toLocaleString('en-IN') : '—'}</strong></div>
      <div><span class="text-muted">Exam Date:</span><br><strong>${fmt(a.exam_date)}</strong></div>
      <div><span class="text-muted">Username:</span><br><strong style="color:#0d9488;">@${a.preferred_username || '—'}</strong></div>
      ${a.reason_for_discontinuation ? `<div style="grid-column:1/-1;"><span class="text-muted">Reason for Discontinuation:</span><br><strong>${a.reason_for_discontinuation}</strong>${a.discontinuation_details ? '<br><span style="color:#6b7280;font-size:0.8rem;">' + a.discontinuation_details + '</span>' : ''}</div>` : ''}
      <div style="grid-column:1/-1;"><span class="text-muted">Applied:</span> <strong>${fmt(a.created_at)}</strong> &nbsp;|&nbsp; <span class="text-muted">Status:</span> <span class="badge" style="background:${statusColors[a.status]}20;color:${statusColors[a.status]}">${capitalize(a.status)}</span></div>
      ${a.status === 'approved' && a.login_password ? `<div style="grid-column:1/-1;background:#ecfdf5;border-radius:8px;padding:10px;"><span class="text-muted">Login Credentials:</span><br><strong>Username:</strong> ${a.preferred_username} &nbsp; <strong>Password:</strong> ${a.login_password}</div>` : ''}
    </div>`;

  document.getElementById('adm-detail-actions').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal('view-admission-modal')">Close</button>
    ${a.status === 'pending' ? `
      <button class="btn btn-success" onclick="updateStatus('${a.id}','approved');closeModal('view-admission-modal')">✓ Approve</button>
      <button class="btn btn-danger" onclick="updateStatus('${a.id}','rejected');closeModal('view-admission-modal')">✕ Reject</button>` : ''}
    ${a.status === 'approved' && a.login_password ? `
      <button class="btn btn-primary" onclick="window.open('https://wa.me/${a.phone ? a.phone.replace(/\D/g,'') : ''}?text=${encodeURIComponent('🎉 *Your LMS Login*\nUsername: ' + a.preferred_username + '\nPassword: ' + a.login_password)}','_blank')">📲 Resend Credentials</button>` : ''}`;
  openModal('view-admission-modal');
}
</script>
</body>
</html>
