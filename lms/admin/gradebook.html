<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grade Book — Ansha Montessori LMS</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>
<div id="toast-container"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="top-header">
      <div class="header-left"><span class="page-title">Grade Book</span></div>
      <div class="header-right"><span id="user-name" class="text-sm font-medium"></span></div>
    </header>
    <main class="page-content">
      <div class="page-header">
        <div><h1>📒 Grade Book</h1><p>Complete academic performance record for all students</p></div>
        <button class="btn btn-outline no-print" onclick="window.print()"><i class="fa-solid fa-print"></i> Print</button>
      </div>

      <!-- Filters -->
      <div class="card mb-4 no-print">
        <div class="card-body">
          <div class="flex gap-4 flex-wrap items-center">
            <div class="form-group" style="margin:0;flex:1;min-width:200px;">
              <label class="form-label">Course</label>
              <select id="gb-course" class="form-control" onchange="renderGradeBook()"></select>
            </div>
            <div class="form-group" style="margin:0;flex:1;min-width:160px;">
              <label class="form-label">Sort By</label>
              <select id="gb-sort" class="form-control" onchange="renderGradeBook()">
                <option value="name">Student Name</option>
                <option value="overall">Overall Grade</option>
                <option value="progress">Progress</option>
              </select>
            </div>
            <div style="margin-top:22px;">
              <button class="btn btn-outline btn-sm" onclick="exportCSV()"><i class="fa-solid fa-download"></i> CSV</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Summary Cards -->
      <div class="grid grid-4 mb-5" id="gb-summary" style="gap:var(--space-4);"></div>

      <!-- Grade Book Table -->
      <div class="card">
        <div class="card-header">
          <h2>Student Grades</h2>
          <div class="flex gap-3 text-xs text-muted items-center">
            <span><span class="grade-pill A">A</span> 80–100%</span>
            <span><span class="grade-pill B">B</span> 60–79%</span>
            <span><span class="grade-pill C">C</span> 40–59%</span>
            <span><span class="grade-pill D">D</span> &lt;40%</span>
          </div>
        </div>
        <div class="table-wrapper" id="gb-table-wrap"></div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/data.js"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/utils.js"></script>
<script>
const user = initPage('admin');
if (user) { populateCourses(); renderGradeBook(); }

function populateCourses() {
  document.getElementById('gb-course').innerHTML =
    '<option value="">All Courses</option>' +
    dbGet(DB.COURSES).map(c => `<option value="${c.id}">${c.icon} ${c.title}</option>`).join('');
}

function gradeLabel(pct) {
  if (pct >= 80) return 'A';
  if (pct >= 60) return 'B';
  if (pct >= 40) return 'C';
  if (pct > 0)   return 'D';
  return 'N';
}

function computeGrades(courseId) {
  const students    = getUsersByRole('student');
  const assignments = dbGet(DB.ASSIGNMENTS).filter(a => !courseId || a.courseId === courseId);
  const quizzes     = dbGet(DB.QUIZZES).filter(q => !courseId || q.courseId === courseId);

  return students.map(s => {
    const enrollments = courseId ? [getEnrollment(s.id, courseId)].filter(Boolean) : getStudentEnrollments(s.id);
    if (!enrollments.length) return null;

    // Assignments
    const aSubmissions = dbGet(DB.SUBMISSIONS).filter(sub =>
      sub.type === 'assignment' && sub.studentId === s.id &&
      assignments.some(a => a.id === sub.assignmentId) && sub.marks !== null
    );
    const aTotal    = aSubmissions.reduce((sum, sub) => {
      const a = dbGetOne(DB.ASSIGNMENTS, sub.assignmentId);
      return sum + (a ? a.maxMarks : 0);
    }, 0);
    const aScored   = aSubmissions.reduce((sum, sub) => sum + (sub.marks || 0), 0);
    const aPercent  = aTotal > 0 ? Math.round((aScored / aTotal) * 100) : null;

    // Quizzes
    const qSubmissions = dbGet(DB.SUBMISSIONS).filter(sub =>
      sub.type === 'quiz' && sub.studentId === s.id &&
      quizzes.some(q => q.id === sub.quizId)
    );
    const qPercent  = qSubmissions.length
      ? Math.round(qSubmissions.reduce((s, sub) => s + (sub.percentage || 0), 0) / qSubmissions.length)
      : null;

    // Progress
    const progVals  = enrollments.map(e => e.progress || 0);
    const progress  = Math.round(progVals.reduce((a, b) => a + b, 0) / progVals.length);

    // Attendance
    const attRecords = courseId
      ? getStudentAttendance(s.id, courseId)
      : dbGet(DB.ATTENDANCE).flatMap(a => a.records.filter(r => r.studentId === s.id).map(r => ({ record: r })));
    const present    = attRecords.filter(r => (r.record || r).status === 'present').length;
    const attPercent = attRecords.length ? Math.round((present / attRecords.length) * 100) : null;

    // Overall
    const components = [aPercent, qPercent, progress, attPercent].filter(v => v !== null);
    const overall    = components.length ? Math.round(components.reduce((a, b) => a + b, 0) / components.length) : 0;

    return { student: s, aPercent, qPercent, progress, attPercent, overall, aCount: aSubmissions.length, qCount: qSubmissions.length };
  }).filter(Boolean);
}

function renderGradeBook() {
  const courseId = document.getElementById('gb-course').value;
  const sortBy   = document.getElementById('gb-sort').value;
  let data = computeGrades(courseId).filter(d => d.overall > 0 || d.progress > 0);

  if (sortBy === 'overall')  data.sort((a, b) => b.overall - a.overall);
  else if (sortBy === 'progress') data.sort((a, b) => b.progress - a.progress);
  else data.sort((a, b) => a.student.name.localeCompare(b.student.name));

  // Summary
  const counts = { A: 0, B: 0, C: 0, D: 0 };
  data.forEach(d => counts[gradeLabel(d.overall)]++);
  const avg = data.length ? Math.round(data.reduce((s, d) => s + d.overall, 0) / data.length) : 0;
  document.getElementById('gb-summary').innerHTML = [
    { label: 'Total Students', value: data.length, icon: '👩‍🎓', color: 'teal' },
    { label: 'Class Average', value: avg + '%', icon: '📊', color: 'blue' },
    { label: 'A Grade Students', value: counts.A, icon: '🏆', color: 'gold' },
    { label: 'Need Attention (D)', value: counts.D, icon: '⚠️', color: 'red' },
  ].map(s => `<div class="stat-card"><div class="stat-icon ${s.color}">${s.icon}</div><div class="stat-info"><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div></div></div>`).join('');

  if (!data.length) {
    document.getElementById('gb-table-wrap').innerHTML = '<div class="empty-state"><div class="empty-icon">📒</div><p>No grade data yet</p></div>';
    return;
  }

  const na = v => v === null ? '<span class="text-muted">—</span>' : `<span class="grade-pill ${gradeLabel(v)}">${v}%</span>`;

  document.getElementById('gb-table-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th>#</th><th>Student</th>
        <th class="grade-cell">Assignments</th>
        <th class="grade-cell">Quizzes</th>
        <th class="grade-cell">Progress</th>
        <th class="grade-cell">Attendance</th>
        <th class="grade-cell">Overall</th>
        <th class="grade-cell">Grade</th>
      </tr></thead>
      <tbody>${data.map((d, i) => `
        <tr>
          <td class="text-muted text-sm">${i + 1}</td>
          <td><div class="flex items-center gap-2">
            <div class="avatar avatar-sm">${d.student.avatar || getInitials(d.student.name)}</div>
            <div>
              <div class="font-medium text-sm">${d.student.name}</div>
              <div class="text-xs text-muted">${d.aCount} submitted · ${d.qCount} quizzes</div>
            </div>
          </div></td>
          <td class="grade-cell">${na(d.aPercent)}</td>
          <td class="grade-cell">${na(d.qPercent)}</td>
          <td class="grade-cell">${progressBar(d.progress)}</td>
          <td class="grade-cell">${na(d.attPercent)}</td>
          <td class="grade-cell"><strong>${d.overall}%</strong></td>
          <td class="grade-cell"><span class="grade-pill ${gradeLabel(d.overall)}">${gradeLabel(d.overall)}</span></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function exportCSV() {
  const courseId = document.getElementById('gb-course').value;
  const data = computeGrades(courseId).filter(d => d.overall > 0 || d.progress > 0);
  const rows = [['Name', 'Email', 'Assignments%', 'Quizzes%', 'Progress%', 'Attendance%', 'Overall%', 'Grade']];
  data.forEach(d => rows.push([
    d.student.name, d.student.email,
    d.aPercent ?? '', d.qPercent ?? '', d.progress, d.attPercent ?? '', d.overall, gradeLabel(d.overall)
  ]));
  const csv = rows.map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'gradebook.csv'; a.click();
}

function getInitials(name) {
  return name ? name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase() : '?';
}
</script>
</body>
</html>
