<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — Ansha Montessori LMS</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>
<div id="toast-container"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="top-header">
      <div class="header-left"><span class="page-title">Reports</span></div>
      <div class="header-right"><span id="user-name" class="text-sm font-medium"></span></div>
    </header>
    <main class="page-content">
      <div class="page-header">
        <div><h1>Reports & Analytics</h1><p>Institute performance overview</p></div>
      </div>

      <!-- Summary Cards -->
      <div class="stats-grid" id="report-stats"></div>

      <!-- Course-wise Table -->
      <div class="card mt-6">
        <div class="card-header"><h2>Course-wise Report</h2></div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr><th>Course</th><th>Teacher</th><th>Enrolled</th><th>Completed</th><th>Completion Rate</th><th>Fees Collected</th><th>Pending Fees</th></tr>
            </thead>
            <tbody id="course-report-table"></tbody>
          </table>
        </div>
      </div>

      <!-- Student Progress Table -->
      <div class="card mt-6">
        <div class="card-header"><h2>Student Progress Summary</h2></div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr><th>Student</th><th>Enrolled Courses</th><th>Completed</th><th>Avg Progress</th><th>Quizzes Taken</th></tr>
            </thead>
            <tbody id="student-report-table"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="../assets/js/data.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/utils.js"></script>
<script>
const user = initPage('admin');
if (user) renderReports();

function renderReports() {
  const students   = getUsersByRole('student');
  const teachers   = getUsersByRole('teacher');
  const courses    = dbGet(DB.COURSES);
  const enrollments = dbGet(DB.ENROLLMENTS);
  const completed  = enrollments.filter(e => e.status === 'completed').length;
  const submissions = dbGet(DB.SUBMISSIONS);

  // Stats
  document.getElementById('report-stats').innerHTML = `
    <div class="stat-card"><div class="stat-icon teal">👩‍🎓</div><div class="stat-info"><div class="stat-value">${students.length}</div><div class="stat-label">Total Students</div></div></div>
    <div class="stat-card"><div class="stat-icon gold">👩‍🏫</div><div class="stat-info"><div class="stat-value">${teachers.length}</div><div class="stat-label">Teachers</div></div></div>
    <div class="stat-card"><div class="stat-icon blue">📋</div><div class="stat-info"><div class="stat-value">${enrollments.length}</div><div class="stat-label">Total Enrollments</div></div></div>
    <div class="stat-card"><div class="stat-icon green">🏆</div><div class="stat-info"><div class="stat-value">${completed}</div><div class="stat-label">Completions</div></div></div>`;

  // Course report
  const courseRows = courses.map(c => {
    const teacher = dbGetOne(DB.USERS, c.teacherId);
    const cEnrolls = enrollments.filter(e => e.courseId === c.id);
    const cComp = cEnrolls.filter(e => e.status === 'completed').length;
    const rate = cEnrolls.length ? Math.round((cComp / cEnrolls.length) * 100) : 0;
    const paid = cEnrolls.filter(e => e.feeStatus === 'paid').length * (c.fee || 0);
    const pending = cEnrolls.filter(e => e.feeStatus === 'pending').length * (c.fee || 0);
    return `<tr>
      <td><strong>${c.icon} ${c.title}</strong></td>
      <td>${teacher ? teacher.name : '—'}</td>
      <td><span class="badge badge-primary">${cEnrolls.length}</span></td>
      <td><span class="badge badge-success">${cComp}</span></td>
      <td>${progressBar(rate)}</td>
      <td class="font-semibold text-success">${formatCurrency(paid)}</td>
      <td class="font-semibold text-warning">${formatCurrency(pending)}</td>
    </tr>`;
  }).join('');
  document.getElementById('course-report-table').innerHTML = courseRows;

  // Student report
  const studentRows = students.map(s => {
    const sEnrolls = enrollments.filter(e => e.studentId === s.id);
    const sComp = sEnrolls.filter(e => e.status === 'completed').length;
    const avgProg = sEnrolls.length ? Math.round(sEnrolls.reduce((sum, e) => sum + e.progress, 0) / sEnrolls.length) : 0;
    const quizCount = submissions.filter(sub => sub.type === 'quiz' && sub.studentId === s.id).length;
    return `<tr>
      <td><div class="flex items-center gap-2"><div class="avatar avatar-sm">${s.avatar || getInitials(s.name)}</div><span class="font-medium">${s.name}</span></div></td>
      <td>${sEnrolls.length}</td>
      <td>${sComp}</td>
      <td>${progressBar(avgProg)}</td>
      <td>${quizCount}</td>
    </tr>`;
  }).join('');
  document.getElementById('student-report-table').innerHTML = studentRows;
}
</script>
</body>
</html>
