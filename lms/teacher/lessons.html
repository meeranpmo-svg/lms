<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lessons — Ansha Montessori LMS</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>
<div id="toast-container"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="top-header">
      <div class="header-left"><span class="page-title">Lessons</span></div>
      <div class="header-right"><span id="user-name" class="text-sm font-medium"></span></div>
    </header>
    <main class="page-content">
      <div class="page-header">
        <div><h1>Lesson Management</h1><p>Create and manage course lessons</p></div>
        <button class="btn btn-primary" onclick="openLessonModal()">+ Add Lesson</button>
      </div>

      <!-- Course Filter Tabs -->
      <div class="tabs" id="course-tabs"></div>

      <!-- Lessons List -->
      <div id="lessons-container"></div>
    </main>
  </div>
</div>

<!-- Lesson Modal -->
<div class="modal-backdrop" id="lesson-modal">
  <div class="modal" style="max-width:600px;">
    <div class="modal-header">
      <h3 id="lesson-modal-title">Add Lesson</h3>
      <button class="modal-close" onclick="closeModal('lesson-modal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="l-id">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Course *</label>
          <select id="l-course" class="form-control"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Module / Chapter</label>
          <input type="text" id="l-module" class="form-control" placeholder="e.g. Module 1: Introduction">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Lesson Title *</label>
          <input type="text" id="l-title" class="form-control" placeholder="Lesson title">
        </div>
        <div class="form-group">
          <label class="form-label">Duration</label>
          <input type="text" id="l-duration" class="form-control" placeholder="e.g. 20 min">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Lesson Type *</label>
        <div class="flex gap-3">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
            <input type="radio" name="l-type" value="video" checked onchange="toggleContentType('video')"> 🎬 Video
          </label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
            <input type="radio" name="l-type" value="text" onchange="toggleContentType('text')"> 📄 Text/Reading
          </label>
        </div>
      </div>
      <div id="video-section" class="form-group">
        <label class="form-label">YouTube/Vimeo Embed URL</label>
        <input type="url" id="l-url" class="form-control" placeholder="https://www.youtube.com/embed/VIDEO_ID">
        <p class="text-xs text-muted mt-1">Use the embed URL format: youtube.com/embed/... or vimeo.com/video/...</p>
      </div>
      <div id="text-section" class="form-group hidden">
        <label class="form-label">Lesson Content (HTML supported)</label>
        <textarea id="l-content" class="form-control" rows="8" placeholder="Write lesson content here. You can use basic HTML tags like &lt;h3&gt;, &lt;p&gt;, &lt;ul&gt;, &lt;li&gt;, &lt;strong&gt;"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('lesson-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveLesson()">Save Lesson</button>
    </div>
  </div>
</div>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/utils.js"></script>
<script>
const user = initPage('teacher');
let activeCourseId = null;

if (user) renderPage();

function renderPage() {
  const courses = dbGet(DB.COURSES).filter(c => c.teacherId === user.id);
  if (!courses.length) {
    document.getElementById('lessons-container').innerHTML = '<div class="empty-state"><div class="empty-icon">📚</div><h3>No Courses Assigned</h3><p>Contact admin to get courses assigned to you</p></div>';
    return;
  }
  // Populate tabs
  const params = new URLSearchParams(window.location.search);
  activeCourseId = params.get('course') || courses[0].id;
  const tabs = courses.map(c => `
    <button class="tab-btn ${c.id === activeCourseId ? 'active' : ''}" onclick="switchCourse('${c.id}', this)">
      ${c.icon} ${c.title.split(' ').slice(0,3).join(' ')}
    </button>`).join('');
  document.getElementById('course-tabs').innerHTML = tabs;

  // Populate course dropdown in modal
  document.getElementById('l-course').innerHTML = courses.map(c => `<option value="${c.id}" ${c.id === activeCourseId ? 'selected' : ''}>${c.icon} ${c.title}</option>`).join('');

  renderLessons();
}

function switchCourse(courseId, btn) {
  activeCourseId = courseId;
  document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('l-course').value = courseId;
  renderLessons();
}

function renderLessons() {
  const lessons = dbGet(DB.LESSONS).filter(l => l.courseId === activeCourseId).sort((a, b) => a.order - b.order);
  if (!lessons.length) {
    document.getElementById('lessons-container').innerHTML = `
      <div class="card"><div class="card-body"><div class="empty-state">
        <div class="empty-icon">🎬</div>
        <h3>No Lessons Yet</h3>
        <p>Add your first lesson to this course</p>
        <button class="btn btn-primary mt-4" onclick="openLessonModal()">+ Add First Lesson</button>
      </div></div></div>`;
    return;
  }

  // Group by module
  const modules = {};
  lessons.forEach(l => {
    const m = l.module || 'General';
    if (!modules[m]) modules[m] = [];
    modules[m].push(l);
  });

  const html = Object.entries(modules).map(([modName, modLessons]) => `
    <div class="card mb-4">
      <div class="card-header" style="background:var(--gray-50);">
        <h3 class="text-sm font-semibold text-muted">📂 ${modName}</h3>
        <span class="badge badge-gray">${modLessons.length} lesson${modLessons.length > 1 ? 's' : ''}</span>
      </div>
      <div>
        ${modLessons.map((l, idx) => `
        <div style="display:flex;align-items:center;gap:var(--space-4);padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--gray-100);">
          <div style="width:36px;height:36px;background:var(--${l.type === 'video' ? 'primary' : 'accent'}-light);color:var(--${l.type === 'video' ? 'primary' : 'accent'}-dark);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;">${l.type === 'video' ? '▶️' : '📄'}</div>
          <div style="flex:1;">
            <div class="font-medium text-sm">${l.title}</div>
            <div class="text-xs text-muted mt-1">
              <span class="badge badge-gray">${l.type === 'video' ? 'Video' : 'Reading'}</span>
              ${l.duration ? `<span class="ml-2">⏱ ${l.duration}</span>` : ''}
            </div>
          </div>
          <div class="flex gap-2">
            <button class="btn btn-outline btn-sm" onclick="previewLesson('${l.id}')">Preview</button>
            <button class="btn btn-ghost btn-sm" onclick="editLesson('${l.id}')">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteLesson('${l.id}','${l.title.replace(/'/g,"\\'")}')">Delete</button>
          </div>
        </div>`).join('')}
      </div>
    </div>`).join('');
  document.getElementById('lessons-container').innerHTML = html;
}

function toggleContentType(type) {
  document.getElementById('video-section').classList.toggle('hidden', type !== 'video');
  document.getElementById('text-section').classList.toggle('hidden', type !== 'text');
}

function openLessonModal(id) {
  document.getElementById('lesson-modal-title').textContent = id ? 'Edit Lesson' : 'Add Lesson';
  if (!id) {
    document.getElementById('l-id').value = '';
    document.getElementById('l-title').value = '';
    document.getElementById('l-module').value = '';
    document.getElementById('l-duration').value = '';
    document.getElementById('l-url').value = '';
    document.getElementById('l-content').value = '';
    document.getElementById('l-course').value = activeCourseId;
    document.querySelector('input[name="l-type"][value="video"]').checked = true;
    toggleContentType('video');
  }
  openModal('lesson-modal');
}

function editLesson(id) {
  const l = dbGetOne(DB.LESSONS, id);
  if (!l) return;
  document.getElementById('l-id').value = l.id;
  document.getElementById('l-course').value = l.courseId;
  document.getElementById('l-module').value = l.module || '';
  document.getElementById('l-title').value = l.title;
  document.getElementById('l-duration').value = l.duration || '';
  document.querySelector(`input[name="l-type"][value="${l.type}"]`).checked = true;
  document.getElementById('l-url').value = l.url || '';
  document.getElementById('l-content').value = l.content || '';
  toggleContentType(l.type);
  openLessonModal(id);
}

function saveLesson() {
  const title  = document.getElementById('l-title').value.trim();
  const courseId = document.getElementById('l-course').value;
  const type   = document.querySelector('input[name="l-type"]:checked').value;
  if (!title || !courseId) { showToast('Title and course are required', 'error'); return; }
  if (type === 'video' && !document.getElementById('l-url').value.trim()) { showToast('Please provide the video embed URL', 'error'); return; }

  const existingLessons = dbGet(DB.LESSONS).filter(l => l.courseId === courseId);
  const id = document.getElementById('l-id').value || genId();
  const lesson = {
    id,
    courseId,
    module:   document.getElementById('l-module').value.trim() || 'General',
    title,
    type,
    url:      type === 'video' ? document.getElementById('l-url').value.trim() : '',
    content:  type === 'text'  ? document.getElementById('l-content').value.trim() : '',
    duration: document.getElementById('l-duration').value.trim(),
    order:    existingLessons.length + 1
  };
  dbSave(DB.LESSONS, lesson);
  closeModal('lesson-modal');
  activeCourseId = courseId;
  renderLessons();
  showToast(`Lesson "${title}" saved!`, 'success');
}

function deleteLesson(id, title) {
  showConfirm(`Delete lesson "<strong>${title}</strong>"?`, () => {
    dbDelete(DB.LESSONS, id);
    dbSet(DB.PROGRESS, dbGet(DB.PROGRESS).filter(p => p.lessonId !== id));
    renderLessons();
    showToast('Lesson deleted', 'warning');
  }, 'Delete Lesson');
}

function previewLesson(id) {
  const l = dbGetOne(DB.LESSONS, id);
  if (!l) return;
  const content = l.type === 'video'
    ? `<iframe src="${l.url}" style="width:100%;aspect-ratio:16/9;border:none;border-radius:var(--radius);" allowfullscreen></iframe>`
    : `<div style="font-size:0.95rem;line-height:1.8;">${l.content}</div>`;
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop active';
  backdrop.innerHTML = `
    <div class="modal" style="max-width:700px;">
      <div class="modal-header">
        <h3>${l.title}</h3>
        <button class="modal-close" onclick="this.closest('.modal-backdrop').remove()">×</button>
      </div>
      <div class="modal-body">${content}</div>
    </div>`;
  document.body.appendChild(backdrop);
}
</script>
</body>
</html>
