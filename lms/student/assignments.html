<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignments — Ansha Montessori LMS</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>
<div id="toast-container"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="top-header">
      <div class="header-left"><span class="page-title">Assignments</span></div>
      <div class="header-right"><span id="user-name" class="text-sm font-medium"></span></div>
    </header>
    <main class="page-content">
      <div class="page-header"><div><h1>My Assignments</h1><p>Submit and track your assignments</p></div></div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('pending', this)">⏳ Pending</button>
        <button class="tab-btn" onclick="switchTab('submitted', this)">✅ Submitted</button>
      </div>
      <div id="tab-pending"></div>
      <div id="tab-submitted" class="hidden"></div>
    </main>
  </div>
</div>

<!-- Submit Modal -->
<div class="modal-backdrop" id="submit-modal">
  <div class="modal" style="max-width:600px;">
    <div class="modal-header">
      <h3 id="submit-modal-title">Submit Assignment</h3>
      <button class="modal-close" onclick="closeModal('submit-modal')">×</button>
    </div>
    <div class="modal-body">
      <div id="submit-instructions" class="card mb-4" style="padding:var(--space-4);background:var(--gray-50);font-size:0.9rem;"></div>
      <div class="form-group">
        <label class="form-label">Your Answer / Submission</label>
        <textarea id="submit-answer" class="form-control" rows="5" placeholder="Write your answer here… (optional if uploading files)"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Attach Files <span class="text-muted text-xs">(Photos, PDFs — max 5MB each)</span></label>
        <div class="file-upload-area" id="file-upload-area" onclick="document.getElementById('file-input').click()" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="handleFileDrop(event)">
          <i class="fa-solid fa-cloud-arrow-up" style="font-size:2rem;color:var(--primary);margin-bottom:8px;display:block;"></i>
          <p class="text-sm font-medium">Tap to upload or drag & drop</p>
          <p class="text-xs text-muted">Images (JPG, PNG) or PDF files</p>
        </div>
        <input type="file" id="file-input" accept="image/*,.pdf" multiple style="display:none" onchange="handleFileSelect(this.files)">
        <div id="file-preview-list" class="mt-3" style="display:flex;flex-direction:column;gap:8px;"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('submit-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="doSubmit()"><i class="fa-solid fa-paper-plane"></i> Submit</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/data.js"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/utils.js"></script>
<script>
const user = initPage('student');
let currentAssignmentId = null;
let pendingFiles = []; // {name, type, size, data (base64)}

if (user) renderPage();

function renderPage() { renderPending(); renderSubmitted(); }

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-pending').classList.toggle('hidden', tab !== 'pending');
  document.getElementById('tab-submitted').classList.toggle('hidden', tab !== 'submitted');
}

function renderPending() {
  const enrollments = getStudentEnrollments(user.id);
  const myCourseIds = enrollments.map(e => e.courseId);
  const assignments = dbGet(DB.ASSIGNMENTS).filter(a => myCourseIds.includes(a.courseId));
  const submissions = dbGet(DB.SUBMISSIONS).filter(s => s.type === 'assignment' && s.studentId === user.id);
  const pending = assignments.filter(a => !submissions.some(s => s.assignmentId === a.id));

  if (!pending.length) {
    document.getElementById('tab-pending').innerHTML = '<div class="empty-state"><div class="empty-icon">🎉</div><h3>All Done!</h3><p>No pending assignments</p></div>';
    return;
  }
  document.getElementById('tab-pending').innerHTML = pending.map(a => {
    const course = dbGetOne(DB.COURSES, a.courseId);
    return `
    <div class="assignment-card mb-4">
      <div class="flex justify-between items-start">
        <h3 class="font-semibold">${a.title}</h3>
        ${isOverdue(a.dueDate) ? '<span class="badge badge-danger">⚠️ Overdue</span>' : (a.dueDate ? `<span class="badge badge-warning">Due: ${formatDate(a.dueDate)}</span>` : '')}
      </div>
      <div class="assignment-meta">
        <span class="badge badge-primary">${course ? course.icon + ' ' + course.title.split(' ').slice(0,2).join(' ') : '—'}</span>
        <span class="text-sm text-muted">Max: ${a.maxMarks} marks</span>
      </div>
      <p class="text-sm text-muted mb-4">${truncate(a.description, 180)}</p>
      <button class="btn btn-primary" onclick="openSubmitModal('${a.id}')">Submit Assignment →</button>
    </div>`;
  }).join('');
}

function renderSubmitted() {
  const enrollments = getStudentEnrollments(user.id);
  const myCourseIds = enrollments.map(e => e.courseId);
  const assignments = dbGet(DB.ASSIGNMENTS).filter(a => myCourseIds.includes(a.courseId));
  const submissions = dbGet(DB.SUBMISSIONS).filter(s => s.type === 'assignment' && s.studentId === user.id);
  const submitted = submissions.filter(s => assignments.some(a => a.id === s.assignmentId));

  if (!submitted.length) {
    document.getElementById('tab-submitted').innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><h3>No Submissions Yet</h3></div>';
    return;
  }
  document.getElementById('tab-submitted').innerHTML = submitted.map(s => {
    const assignment = dbGetOne(DB.ASSIGNMENTS, s.assignmentId);
    if (!assignment) return '';
    const course = dbGetOne(DB.COURSES, assignment.courseId);
    return `
    <div class="assignment-card mb-4">
      <div class="flex justify-between items-start">
        <h3 class="font-semibold">${assignment.title}</h3>
        ${s.marks !== null
          ? `<span class="badge badge-success">Graded: ${s.marks}/${assignment.maxMarks}</span>`
          : '<span class="badge badge-warning">Awaiting Grade</span>'}
      </div>
      <div class="assignment-meta">
        <span class="badge badge-primary">${course ? course.icon + ' ' + course.title.split(' ').slice(0,2).join(' ') : '—'}</span>
        <span class="text-sm text-muted">Submitted: ${formatDate(s.submittedAt)}</span>
      </div>
      ${s.feedback ? `<div class="alert alert-info mt-3"><strong>Teacher Feedback:</strong> ${s.feedback}</div>` : ''}
    </div>`;
  }).join('');
}

function openSubmitModal(assignmentId) {
  currentAssignmentId = assignmentId;
  pendingFiles = [];
  const a = dbGetOne(DB.ASSIGNMENTS, assignmentId);
  if (!a) return;
  document.getElementById('submit-modal-title').textContent = a.title;
  document.getElementById('submit-instructions').innerHTML = `<strong>Instructions:</strong><br>${a.description}`;
  document.getElementById('submit-answer').value = '';
  document.getElementById('file-preview-list').innerHTML = '';
  openModal('submit-modal');
}

function handleFileSelect(files) {
  [...files].forEach(file => {
    if (file.size > 5 * 1024 * 1024) { showToast(`${file.name} is too large (max 5MB)`, 'error'); return; }
    const reader = new FileReader();
    reader.onload = e => {
      pendingFiles.push({ name: file.name, type: file.type, size: file.size, data: e.target.result });
      renderFilePreviews();
    };
    reader.readAsDataURL(file);
  });
}

function handleFileDrop(e) {
  e.preventDefault();
  document.getElementById('file-upload-area').classList.remove('drag-over');
  handleFileSelect(e.dataTransfer.files);
}

function renderFilePreviews() {
  document.getElementById('file-preview-list').innerHTML = pendingFiles.map((f, i) => `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius);font-size:0.875rem;">
      <span style="font-size:1.3rem;">${f.type.startsWith('image/') ? '🖼️' : '📄'}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.name}</span>
      <span class="text-muted text-xs">${(f.size/1024).toFixed(0)}KB</span>
      <button onclick="removeFile(${i})" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:1rem;">✕</button>
    </div>`).join('');
}

function removeFile(i) {
  pendingFiles.splice(i, 1);
  renderFilePreviews();
}

function doSubmit() {
  const answer = document.getElementById('submit-answer').value.trim();
  if (!answer && !pendingFiles.length) { showToast('Please write an answer or attach a file', 'error'); return; }
  const sub = submitAssignment(user.id, currentAssignmentId, answer);
  // Attach files to submission
  if (pendingFiles.length && sub) {
    sub.files = pendingFiles.map(f => ({ name: f.name, type: f.type, data: f.data }));
    dbSave(DB.SUBMISSIONS, sub);
  }
  closeModal('submit-modal');
  pendingFiles = [];
  renderPending();
  renderSubmitted();
  showToast('Assignment submitted! ✓', 'success');
}
</script>
</body>
</html>
