<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Recordings — Ansha Montessori LMS</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>
<div id="toast-container"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="top-header">
      <div class="header-left"><span class="page-title">Class Recordings</span></div>
      <div class="header-right"><span id="user-name" class="text-sm font-medium"></span></div>
    </header>
    <main class="page-content">

      <div class="page-header">
        <div>
          <h1>🎬 Class Recordings</h1>
          <p>Watch your missed sessions or revise any class at any time</p>
        </div>
      </div>

      <!-- Filters -->
      <div class="card mb-4">
        <div class="card-body" style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
          <input type="text" id="search-input" class="form-control" style="max-width:220px;" placeholder="🔍 Search recordings…" oninput="renderRecordings()">
          <select id="filter-course" class="form-control" style="max-width:240px;" onchange="renderRecordings()">
            <option value="">All Courses</option>
          </select>
          <button class="btn btn-ghost btn-sm" onclick="clearFilters()">✕ Clear</button>
        </div>
      </div>

      <!-- Recordings Grid -->
      <div id="recordings-container"></div>

    </main>
  </div>
</div>

<!-- Video Player Modal -->
<div class="modal-backdrop" id="video-modal">
  <div class="modal" style="max-width:820px;">
    <div class="modal-header">
      <h3 id="video-title">Recording</h3>
      <button class="modal-close" onclick="closeModal('video-modal')">×</button>
    </div>
    <div class="modal-body" style="padding:0;">
      <div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;background:#000;">
        <iframe id="video-frame" src="" allowfullscreen
          style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;"></iframe>
      </div>
      <div id="video-meta" style="padding:16px;font-size:0.88rem;color:#555;"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/data.js"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/utils.js"></script>
<script>
const user = initPage('student');
if (user) {
  // Sync recordings from Supabase first so students always see latest
  sbSyncRecordingsToLocal()
    .catch(() => {})
    .finally(() => {
      sbSyncToLocal(user.id, 'student').catch(() => {}).finally(renderPage);
    });
}

function renderPage() {
  populateCourseFilter();
  renderRecordings();
}

function populateCourseFilter() {
  const courses = dbGet(DB.COURSES);
  document.getElementById('filter-course').innerHTML =
    '<option value="">All Courses</option>' +
    courses.map(c => `<option value="${c.id}">${c.icon||'📚'} ${c.title}</option>`).join('');
}

function getRecordings() {
  return JSON.parse(localStorage.getItem('lms_recordings') || '[]');
}

function toDriveEmbed(url) {
  if (!url) return '';
  // Already embed URL
  if (url.includes('/preview')) return url;
  // Extract file ID from various Drive URL formats
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return `https://drive.google.com/file/d/${m[1]}/preview`;
  return url;
}

function renderRecordings() {
  const search  = document.getElementById('search-input').value.toLowerCase();
  const fCourse = document.getElementById('filter-course').value;
  const courses = dbGet(DB.COURSES);

  let recs = getRecordings();
  if (fCourse) recs = recs.filter(r => r.courseId === fCourse);
  if (search)  recs = recs.filter(r =>
    r.title.toLowerCase().includes(search) ||
    (r.description||'').toLowerCase().includes(search));
  recs.sort((a,b) => new Date(b.date||0) - new Date(a.date||0));

  const container = document.getElementById('recordings-container');

  if (!recs.length) {
    container.innerHTML = `
      <div class="card"><div class="card-body"><div class="empty-state">
        <div class="empty-icon">🎬</div>
        <h3>No Recordings Yet</h3>
        <p>Class recordings will appear here once uploaded by your admin.</p>
      </div></div></div>`;
    return;
  }

  // Group by course
  const grouped = {};
  recs.forEach(r => {
    if (!grouped[r.courseId||'general']) grouped[r.courseId||'general'] = [];
    grouped[r.courseId||'general'].push(r);
  });

  container.innerHTML = Object.entries(grouped).map(([cId, list]) => {
    const course = courses.find(c => c.id === cId);
    const cards  = list.map(r => `
      <div class="recording-card" onclick="playVideo('${r.id}')" style="cursor:pointer;border:1px solid var(--gray-200);border-radius:12px;overflow:hidden;transition:box-shadow .2s;background:#fff;"
        onmouseover="this.style.boxShadow='0 8px 24px rgba(0,0,0,0.1)'" onmouseout="this.style.boxShadow=''">
        <div style="background:linear-gradient(135deg,#1e1b4b,#3730a3);aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative;">
          <div style="width:56px;height:56px;background:rgba(255,255,255,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;border:2px solid rgba(255,255,255,0.3);">▶️</div>
          ${r.date ? `<div style="position:absolute;bottom:8px;right:10px;background:rgba(0,0,0,0.5);color:#fff;font-size:0.72rem;padding:2px 8px;border-radius:10px;">📅 ${new Date(r.date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</div>` : ''}
        </div>
        <div style="padding:14px;">
          <div class="font-semibold text-sm mb-1" style="line-height:1.4;">${r.title}</div>
          ${r.description ? `<div class="text-xs text-muted" style="line-height:1.5;margin-top:4px;">${r.description}</div>` : ''}
          <div style="margin-top:10px;">
            <span class="badge badge-gray text-xs">🎬 Class Recording</span>
          </div>
        </div>
      </div>`).join('');

    return `
      <div class="mb-6">
        <h3 style="font-size:1rem;font-weight:700;color:var(--gray-700);margin-bottom:14px;display:flex;align-items:center;gap:8px;">
          ${course ? course.icon+' '+course.title : '📚 General'}
          <span style="font-size:0.78rem;font-weight:400;color:var(--gray-400);">(${list.length} recording${list.length>1?'s':''})</span>
        </h3>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;">
          ${cards}
        </div>
      </div>`;
  }).join('');
}

function playVideo(id) {
  const recs   = getRecordings();
  const r      = recs.find(x => x.id === id);
  if (!r) return;
  const embed  = toDriveEmbed(r.driveUrl);
  document.getElementById('video-title').textContent = r.title;
  document.getElementById('video-frame').src = embed;

  // Auto-mark attendance when student watches a recording
  let attendanceBadge = '';
  if (user && r.courseId && r.date) {
    autoMarkAttendance(user.id, r.courseId, r.date);
    attendanceBadge = `&nbsp;|&nbsp;<span style="color:#0d9488;font-weight:600;">✅ Attendance marked</span>`;
  }

  document.getElementById('video-meta').innerHTML = `
    ${r.date ? `<span>📅 ${new Date(r.date).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</span>` : ''}
    ${attendanceBadge}
    ${r.description ? `&nbsp;|&nbsp;<span>${r.description}</span>` : ''}`;
  openModal('video-modal');
}

// Stop video when modal closes
document.querySelector('#video-modal .modal-close').addEventListener('click', () => {
  document.getElementById('video-frame').src = '';
});

function clearFilters() {
  document.getElementById('search-input').value = '';
  document.getElementById('filter-course').value = '';
  renderRecordings();
}
</script>
</body>
</html>
