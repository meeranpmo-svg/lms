<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile & Certificates — Ansha Montessori LMS</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>
<div id="toast-container"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="top-header">
      <div class="header-left"><span class="page-title">Profile & Certificates</span></div>
      <div class="header-right"><span id="user-name" class="text-sm font-medium"></span></div>
    </header>
    <main class="page-content">
      <!-- Profile Hero -->
      <div class="profile-hero">
        <div class="profile-avatar-wrap">
          <div class="avatar avatar-xl" id="profile-avatar"></div>
        </div>
        <div class="profile-info" style="flex:1;">
          <h2 id="profile-name"></h2>
          <p id="profile-email"></p>
          <div class="profile-stats" id="profile-stats"></div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-5);">
        <!-- Certificates -->
        <div class="card">
          <div class="card-header"><h2>🏆 My Certificates</h2></div>
          <div class="card-body" id="certs-list"></div>
        </div>

        <!-- Quiz Results -->
        <div class="card">
          <div class="card-header"><h2>📊 Quiz Results</h2></div>
          <div class="card-body" id="quiz-results-list"></div>
        </div>
      </div>

      <!-- Certificate Section -->
      <div style="margin-top:var(--space-6);">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-4);flex-wrap:wrap;gap:10px;">
          <div>
            <h2 style="font-size:1.1rem;font-weight:700;">🎓 Certificate of Completion</h2>
            <p style="font-size:0.82rem;color:#64748b;margin-top:2px;">Your official certificate — issued by Inspireway Education Services Private Limited</p>
          </div>
          <button onclick="printCertificate()" style="display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#1a7a7a,#0d9488);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:700;font-size:0.88rem;cursor:pointer;box-shadow:0 4px 12px rgba(13,148,136,.3);">
            🖨️ Print / Save as PDF
          </button>
        </div>
        <div id="cert-preview" style="background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.10);overflow:hidden;"></div>
      </div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/data.js"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/utils.js"></script>
<script>
const user = initPage('student');
if (user) renderPage();

function renderPage() {
  // Profile
  document.getElementById('profile-avatar').textContent = user.avatar || getInitials(user.name);
  document.getElementById('profile-name').textContent = user.name;
  document.getElementById('profile-email').textContent = user.email;

  const enrollments = getStudentEnrollments(user.id);
  const completed = enrollments.filter(e => e.status === 'completed').length;
  const avgProgress = enrollments.length
    ? Math.round(enrollments.reduce((s,e) => s + e.progress, 0) / enrollments.length) : 0;
  const quizzes = dbGet(DB.SUBMISSIONS).filter(s => s.type === 'quiz' && s.studentId === user.id);

  document.getElementById('profile-stats').innerHTML = `
    <div class="profile-stat"><div class="val">${enrollments.length}</div><div class="lbl">Enrolled</div></div>
    <div class="profile-stat"><div class="val">${completed}</div><div class="lbl">Completed</div></div>
    <div class="profile-stat"><div class="val">${avgProgress}%</div><div class="lbl">Avg Progress</div></div>
    <div class="profile-stat"><div class="val">${quizzes.length}</div><div class="lbl">Quizzes</div></div>`;

  // Certificates
  const completedEnrolls = enrollments.filter(e => e.status === 'completed');
  const certItems = completedEnrolls.length ? completedEnrolls : enrollments; // show all enrolled if none completed
  if (!certItems.length) {
    document.getElementById('certs-list').innerHTML = '<div class="text-center py-4"><div style="font-size:3rem;">🏆</div><p class="text-muted mt-2">Enroll in a course to earn a certificate</p></div>';
  } else {
    document.getElementById('certs-list').innerHTML = certItems.map(e => {
      const course = dbGetOne(DB.COURSES, e.courseId);
      const isCompleted = e.status === 'completed';
      return `
      <div style="display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) 0;border-bottom:1px solid var(--gray-100);">
        <div style="font-size:2rem;">${course ? course.icon : '🏆'}</div>
        <div style="flex:1;">
          <div class="font-semibold text-sm">${course ? course.title : '—'}</div>
          <div class="text-xs text-muted">${isCompleted ? '✅ Completed' : '📖 In Progress'} · ${formatDate(e.enrolledAt)}</div>
        </div>
        <button class="btn btn-outline btn-sm" onclick="showCertificate('${e.courseId}')">🎓 View</button>
      </div>`;
    }).join('');
  }

  // Render default certificate (first enrolled course)
  const defaultEnroll = completedEnrolls[0] || enrollments[0];
  const defaultCourse = defaultEnroll ? dbGetOne(DB.COURSES, defaultEnroll.courseId) : null;
  renderCertPreview(defaultCourse ? defaultCourse.id : null);

  // Quiz Results
  if (!quizzes.length) {
    document.getElementById('quiz-results-list').innerHTML = '<p class="text-muted text-sm text-center py-4">No quizzes taken yet</p>';
  } else {
    document.getElementById('quiz-results-list').innerHTML = quizzes.map(s => {
      const quiz = dbGetOne(DB.QUIZZES, s.quizId);
      const course = quiz ? dbGetOne(DB.COURSES, quiz.courseId) : null;
      const passed = s.percentage >= (quiz ? quiz.passMark : 60);
      return `
      <div style="display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) 0;border-bottom:1px solid var(--gray-100);">
        <div style="font-size:1.5rem;">${passed ? '✅' : '❌'}</div>
        <div style="flex:1;">
          <div class="font-medium text-sm">${quiz ? quiz.title : '—'}</div>
          <div class="text-xs text-muted">${course ? course.title : '—'} · ${formatDate(s.submittedAt)}</div>
        </div>
        <div class="text-center">
          <div class="font-bold ${passed ? 'text-success' : 'text-danger'}">${s.percentage}%</div>
          <div class="text-xs text-muted">${s.score}/${s.total}</div>
        </div>
      </div>`;
    }).join('');
  }
}

function _certHTML(studentName, courseName, enrollmentNo, issueDate) {
  return `
  <div id="cert-body" style="
    font-family:'Georgia',serif;
    background:linear-gradient(160deg,#fffdf5 0%,#f0fdf9 50%,#fffdf5 100%);
    border:12px solid #b8860b;
    outline:3px solid #1a7a7a;
    outline-offset:-18px;
    padding:52px 56px 44px;
    position:relative;
    min-height:480px;
    box-sizing:border-box;">
    <div style="position:absolute;top:14px;left:14px;font-size:1.6rem;color:#b8860b;line-height:1;">❋</div>
    <div style="position:absolute;top:14px;right:14px;font-size:1.6rem;color:#b8860b;line-height:1;">❋</div>
    <div style="position:absolute;bottom:14px;left:14px;font-size:1.6rem;color:#b8860b;line-height:1;">❋</div>
    <div style="position:absolute;bottom:14px;right:14px;font-size:1.6rem;color:#b8860b;line-height:1;">❋</div>
    <div style="text-align:center;margin-bottom:12px;">
      <div style="display:inline-flex;align-items:center;gap:14px;margin-bottom:6px;">
        <div style="width:52px;height:52px;background:linear-gradient(135deg,#1a7a7a,#0d9488);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.7rem;flex-shrink:0;">🏫</div>
        <div style="text-align:left;">
          <div style="font-family:'Segoe UI',sans-serif;font-weight:900;font-size:1.15rem;color:#1a7a7a;letter-spacing:0.5px;">ANSHA MONTESSORI</div>
          <div style="font-family:'Segoe UI',sans-serif;font-size:0.72rem;color:#666;letter-spacing:1px;text-transform:uppercase;">Teacher Training Institute</div>
        </div>
      </div>
      <div style="font-family:'Segoe UI',sans-serif;font-size:0.68rem;color:#888;letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;">Inspireway Education Services Private Limited</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin:14px 0 18px;">
      <div style="flex:1;height:1.5px;background:linear-gradient(to right,transparent,#b8860b);"></div>
      <div style="font-size:1.1rem;color:#b8860b;">✦</div>
      <div style="flex:1;height:1.5px;background:linear-gradient(to left,transparent,#b8860b);"></div>
    </div>
    <div style="text-align:center;margin-bottom:18px;">
      <div style="font-size:2rem;font-weight:bold;color:#b8860b;letter-spacing:3px;text-transform:uppercase;text-shadow:1px 1px 2px rgba(184,134,11,.15);">Certificate</div>
      <div style="font-size:0.88rem;letter-spacing:4px;color:#555;text-transform:uppercase;margin-top:4px;">of Completion</div>
    </div>
    <div style="text-align:center;font-size:0.92rem;color:#444;line-height:1.8;margin-bottom:6px;">This is to proudly certify that</div>
    <div style="text-align:center;margin:6px 0 8px;">
      <span style="font-size:2rem;font-weight:bold;color:#1a7a7a;font-family:'Georgia',serif;border-bottom:2px solid #b8860b;padding-bottom:3px;">${studentName}</span>
    </div>
    <div style="text-align:center;font-size:0.9rem;color:#444;line-height:1.9;margin-bottom:6px;">has successfully completed the course</div>
    <div style="text-align:center;margin:6px 0 14px;">
      <span style="font-size:1.18rem;font-weight:700;color:#0d4f4f;font-family:'Segoe UI',sans-serif;background:#f0fdf9;padding:6px 22px;border-radius:8px;border:1px solid #99f6e4;">${courseName}</span>
    </div>
    <div style="text-align:center;font-size:0.82rem;color:#666;margin-bottom:6px;">with dedication and commitment to the art of Montessori education</div>
    <div style="display:flex;align-items:center;gap:10px;margin:18px 0;">
      <div style="flex:1;height:1px;background:linear-gradient(to right,transparent,#b8860b88);"></div>
      <div style="font-size:0.9rem;color:#b8860b;">✦</div>
      <div style="flex:1;height:1px;background:linear-gradient(to left,transparent,#b8860b88);"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:8px;padding:0 20px;">
      <div style="text-align:center;">
        <div style="font-family:'Brush Script MT','Comic Sans MS',cursive;font-size:1.5rem;color:#1a7a7a;margin-bottom:4px;line-height:1.2;">Shakila Hussain</div>
        <div style="border-top:1.5px solid #b8860b;padding-top:6px;">
          <div style="font-weight:700;font-size:0.82rem;color:#333;font-family:'Segoe UI',sans-serif;">Mrs. Shakila Hussain</div>
          <div style="font-size:0.74rem;color:#666;font-family:'Segoe UI',sans-serif;letter-spacing:0.5px;">Director</div>
        </div>
      </div>
      <div style="text-align:center;">
        <div style="font-family:'Brush Script MT','Comic Sans MS',cursive;font-size:1.5rem;color:#1a7a7a;margin-bottom:4px;line-height:1.2;">Abinaya Jothibasu</div>
        <div style="border-top:1.5px solid #b8860b;padding-top:6px;">
          <div style="font-weight:700;font-size:0.82rem;color:#333;font-family:'Segoe UI',sans-serif;">Mrs. Abinaya Jothibasu</div>
          <div style="font-size:0.74rem;color:#666;font-family:'Segoe UI',sans-serif;letter-spacing:0.5px;">Principal</div>
        </div>
      </div>
    </div>
    <div style="text-align:center;margin-top:18px;font-family:'Segoe UI',sans-serif;">
      <div style="font-size:0.72rem;color:#888;">
        Enrollment No: <strong style="color:#1a7a7a;">${enrollmentNo || '—'}</strong>
        &nbsp;·&nbsp; Date of Issue: <strong>${issueDate}</strong>
        &nbsp;·&nbsp; lms.anshamontessori.com
      </div>
      <div style="font-size:0.65rem;color:#aaa;margin-top:4px;">Inspireway Education Services Private Limited · Ansha Montessori Teacher Training Institute</div>
    </div>
  </div>`;
}

function renderCertPreview(courseId) {
  const enrollments = getStudentEnrollments(user.id);
  const enroll = courseId
    ? enrollments.find(e => e.courseId === courseId)
    : (enrollments.find(e => e.status === 'completed') || enrollments[0]);
  const course = enroll ? dbGetOne(DB.COURSES, enroll.courseId) : null;
  const courseName = course ? course.title : 'Advance Montessori Teacher Training';
  const issueDate = new Date().toLocaleDateString('en-IN', { day:'2-digit', month:'long', year:'numeric' });
  const enrNo = dbGet(DB.USERS).find(u => u.id === user.id)?.enrollmentNo || '—';
  document.getElementById('cert-preview').innerHTML = _certHTML(user.name, courseName, enrNo, issueDate);
  document.getElementById('cert-preview').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showCertificate(courseId) {
  renderCertPreview(courseId);
}

function printCertificate() {
  const enrollments = getStudentEnrollments(user.id);
  const enroll = enrollments.find(e => e.status === 'completed') || enrollments[0];
  const course = enroll ? dbGetOne(DB.COURSES, enroll.courseId) : null;
  const courseName = course ? course.title : 'Advance Montessori Teacher Training';
  const issueDate = new Date().toLocaleDateString('en-IN', { day:'2-digit', month:'long', year:'numeric' });
  const enrNo = dbGet(DB.USERS).find(u => u.id === user.id)?.enrollmentNo || '—';
  const win = window.open('', '_blank', 'width=900,height=700');
  win.document.write(`<!DOCTYPE html><html><head>
    <meta charset="UTF-8"><title>Certificate — ${user.name}</title>
    <style>
      *{box-sizing:border-box;margin:0;padding:0;}
      body{background:#f8f8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
      .wrap{max-width:820px;width:100%;background:#fff;box-shadow:0 8px 40px rgba(0,0,0,.15);}
      .no-print{text-align:center;padding:16px;background:#fff;border-top:1px solid #e2e8f0;}
      .no-print button{padding:10px 28px;background:linear-gradient(135deg,#1a7a7a,#0d9488);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;margin:0 6px;}
      @media print{body{background:#fff;padding:0;}.no-print{display:none;}.wrap{box-shadow:none;max-width:100%;}}
    </style>
  </head><body>
    <div class="wrap">
      ${_certHTML(user.name, courseName, enrNo, issueDate)}
      <div class="no-print">
        <button onclick="window.print()">🖨️ Print Certificate</button>
        <button onclick="window.close()" style="background:#64748b;">✕ Close</button>
      </div>
    </div>
    <script>setTimeout(()=>window.print(),600);<\/script>
  </body></html>`);
  win.document.close();
}
</script>
</body>
</html>
