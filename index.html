<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0; url=lms/index.html" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ansha Montessori — LMS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .logo { font-size: 60px; animation: pulse 1s infinite; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    h1 { font-size: 1.8rem; font-weight: 700; }
    p { color: #94a3b8; font-size: 1rem; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #334155;
      border-top-color: #1a7a7a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a {
      color: #1a7a7a;
      text-decoration: none;
      font-size: 0.9rem;
      margin-top: 10px;
      display: inline-block;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="loader">
    <div class="logo">🏫</div>
    <h1>Ansha Montessori</h1>
    <p>Loading LMS Portal…</p>
    <div class="spinner"></div>
    <a href="lms/">Click here if not redirected</a>
  </div>
  <script>
    setTimeout(() => { window.location.href = 'lms/index.html'; }, 1500);
  </script>
</body>
</html>
