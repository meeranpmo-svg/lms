server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Charset
    charset utf-8;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Static HTML pages — serve directly
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Cache CSS / JS aggressively
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Cache fonts and images
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Disable access logs for favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # Custom error pages
    error_page 404 /index.html;
}
